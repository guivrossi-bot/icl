[build]
  command = "npm run build"
  publish = "dist"

# Proxy /labs/flare/* to the Flare Netlify site
[[redirects]]
  from = "/labs/flare/*"
  to = "https://FLARE-SITE.netlify.app/labs/flare/:splat"
  status = 200
  force = true

# Proxy /labs/cutbench/* to the Cutbench Netlify site
[[redirects]]
  from = "/labs/cutbench/*"
  to = "https://CUTBENCH-SITE.netlify.app/labs/cutbench/:splat"
  status = 200
  force = true

# SPA fallback for the ICL hub
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
