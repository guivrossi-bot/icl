<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#0a0c0f"/>
  <!-- Top accent line — multi-tech gradient -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#d4541a"/>
      <stop offset="33%"  stop-color="#378ADD"/>
      <stop offset="66%"  stop-color="#1e6ab5"/>
      <stop offset="100%" stop-color="#4db6ac"/>
    </linearGradient>
  </defs>
  <rect x="8" y="7" width="48" height="2.5" rx="1.2" fill="url(#g)"/>
  <!-- ICL text -->
  <text x="32" y="44" font-family="'Arial Black', 'Arial', sans-serif" font-weight="900" font-size="22" fill="#ffffff" text-anchor="middle" letter-spacing="1">ICL</text>
</svg>
